name: Deploy Public Dist

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-public-dist
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"
      OBFUSCATE_DIST: ${{ vars.OBFUSCATE_DIST || '1' }}
      PUBLIC_DEPLOY_BRANCH: ${{ vars.PUBLIC_DEPLOY_BRANCH || 'main' }}
      PUBLIC_DEPLOY_REPO: JM-Labs-Pvt-Ltd/JM-Labs-Website
      PUBLIC_DEPLOY_SSH_KEY_B64: ${{ secrets.PUBLIC_DEPLOY_SSH_KEY_B64 }}
      PUBLIC_DEPLOY_SSH_KEY: ${{ secrets.PUBLIC_DEPLOY_SSH_KEY }}

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          if [ -z "${PUBLIC_DEPLOY_SSH_KEY}" ] && [ -z "${PUBLIC_DEPLOY_SSH_KEY_B64}" ]; then
            echo "Missing required secret: PUBLIC_DEPLOY_SSH_KEY or PUBLIC_DEPLOY_SSH_KEY_B64"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Build dist output
        run: npm run build

      - name: Obfuscate dist output when enabled
        run: ./scripts/obfuscate-dist.sh

      - name: Configure deploy SSH key
        run: |
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          KEY_PATH="${HOME}/.ssh/public_deploy_key"
          TMP_DIR="$(mktemp -d)"

          validate_key() {
            local candidate="$1"
            chmod 600 "${candidate}"
            ssh-keygen -y -f "${candidate}" > /dev/null 2>&1
          }

          if [ -n "${PUBLIC_DEPLOY_SSH_KEY_B64}" ]; then
            printf '%s' "${PUBLIC_DEPLOY_SSH_KEY_B64}" | tr -d '\r\n ' | base64 --decode > "${TMP_DIR}/from_b64" 2>/dev/null || true
            if [ -s "${TMP_DIR}/from_b64" ] && validate_key "${TMP_DIR}/from_b64"; then
              cp "${TMP_DIR}/from_b64" "${KEY_PATH}"
              echo "Using base64-encoded deploy key secret."
            fi
          fi

          if [ ! -f "${KEY_PATH}" ] && [ -n "${PUBLIC_DEPLOY_SSH_KEY}" ]; then
            printf '%s\n' "${PUBLIC_DEPLOY_SSH_KEY}" | tr -d '\r' > "${TMP_DIR}/raw_multiline"
            if validate_key "${TMP_DIR}/raw_multiline"; then
              cp "${TMP_DIR}/raw_multiline" "${KEY_PATH}"
              echo "Using raw multiline deploy key secret."
            fi
          fi

          if [ ! -f "${KEY_PATH}" ] && [ -n "${PUBLIC_DEPLOY_SSH_KEY}" ]; then
            printf '%s' "${PUBLIC_DEPLOY_SSH_KEY}" | perl -0pe 's/\r//g; s/\\n/\n/g;' > "${TMP_DIR}/raw_escaped_newlines"
            if validate_key "${TMP_DIR}/raw_escaped_newlines"; then
              cp "${TMP_DIR}/raw_escaped_newlines" "${KEY_PATH}"
              echo "Using deploy key secret with escaped newlines."
            fi
          fi

          if [ ! -f "${KEY_PATH}" ] && [ -n "${PUBLIC_DEPLOY_SSH_KEY}" ]; then
            printf '%s' "${PUBLIC_DEPLOY_SSH_KEY}" | perl -0pe "s/\r//g; s/^['\\\"]//; s/['\\\"]\$//; s/\\\\n/\n/g;" > "${TMP_DIR}/raw_quoted"
            if validate_key "${TMP_DIR}/raw_quoted"; then
              cp "${TMP_DIR}/raw_quoted" "${KEY_PATH}"
              echo "Using quoted deploy key secret after normalization."
            fi
          fi

          if [ ! -f "${KEY_PATH}" ]; then
            echo "Could not parse deploy key from PUBLIC_DEPLOY_SSH_KEY or PUBLIC_DEPLOY_SSH_KEY_B64."
            echo "Store the full private key including BEGIN/END lines, or use a valid base64-encoded key."
            exit 1
          fi

          chmod 600 "${HOME}/.ssh/public_deploy_key"
          ssh-keyscan github.com >> "${HOME}/.ssh/known_hosts"
          chmod 644 "${HOME}/.ssh/known_hosts"
          cat <<'EOF' > "${HOME}/.ssh/config"
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/public_deploy_key
            IdentitiesOnly yes
          EOF
          chmod 600 "${HOME}/.ssh/config"

      - name: Clone or initialize public deploy repository
        run: |
          if git ls-remote --exit-code --heads "git@github.com:${PUBLIC_DEPLOY_REPO}.git" "${PUBLIC_DEPLOY_BRANCH}" >/dev/null 2>&1; then
            git clone --branch "${PUBLIC_DEPLOY_BRANCH}" "git@github.com:${PUBLIC_DEPLOY_REPO}.git" public-dist
          else
            git clone "git@github.com:${PUBLIC_DEPLOY_REPO}.git" public-dist
            cd public-dist
            git checkout --orphan "${PUBLIC_DEPLOY_BRANCH}"
          fi

      - name: Sync dist into public repository
        run: |
          rsync -a --delete --exclude='.git/' dist/ public-dist/

      - name: Commit and push public dist
        working-directory: public-dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No deploy changes to publish."
            exit 0
          fi

          git commit -m "Deploy site from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin "HEAD:${PUBLIC_DEPLOY_BRANCH}"
